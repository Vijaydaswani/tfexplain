name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Run tests
        run: |
          python -m unittest discover -s tests

      - name: Build package
        run: |
          python -m build

      - name: Check package
        run: |
          python -m twine check dist/*

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1

  build-binaries:
    name: Build binary (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            asset_name: tfexplain-linux-x86_64.zip
          - label: macos-x86_64
            os: macos-13
            asset_name: tfexplain-macos-x86_64.zip
          - label: windows-x86_64
            os: windows-latest
            asset_name: tfexplain-windows-x86_64.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build standalone binary
        env:
          PYINSTALLER_CONFIG_DIR: ${{ github.workspace }}/.pyinstaller
        run: |
          python -m PyInstaller --clean --onedir --name tfexplain --paths src scripts/tfexplain_binary.py

      - name: Package binary bundle
        shell: bash
        run: |
          mkdir -p release
          python <<'PY'
          import os
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile, ZipInfo

          root = Path("dist/tfexplain")
          output = Path("release") / "${{ matrix.asset_name }}"

          with ZipFile(output, "w", ZIP_DEFLATED) as archive:
              for path in root.rglob("*"):
                  if not path.is_file():
                      continue
                  archive_name = Path("tfexplain") / path.relative_to(root)
                  info = ZipInfo(str(archive_name).replace(os.sep, "/"))
                  info.external_attr = (path.stat().st_mode & 0xFFFF) << 16
                  with path.open("rb") as source:
                      archive.writestr(info, source.read())
          PY

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/${{ matrix.asset_name }}
          if-no-files-found: error

  github-release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-binaries
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
